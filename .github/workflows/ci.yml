name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, pdo_sqlite, bcmath
          coverage: none

      - name: Copy environment file
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Generate app key
        run: php artisan key:generate

      - name: Run tests
        run: >-
          php artisan test --compact
          tests/Feature/BusinessControlDashboardTest.php
          tests/Feature/Central/SystemUpdateVersionSyncCommandTest.php
          tests/Feature/TenantMigrationSafetyCommandTest.php
          tests/Feature/Tenancy/StandingsTest.php
          tests/Feature/Tenancy/GameManagementTest.php
          tests/Feature/Tenancy/TenantSettingsProfileTest.php
